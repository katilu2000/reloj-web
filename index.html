<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reloj Digital</title>
  <style>
    /* Estilo general */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-color: #121212; /* fondo oscuro sólido */
      font-family: 'Courier New', monospace;
      color: #00ffcc; /* color del reloj tipo neón */
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #00ffcc;
      text-shadow: 0 0 5px #00ffcc;
    }

    #hora {
      font-size: 96px;
      font-weight: bold;
      text-shadow: 0 0 20px #00ffcc;
    }

    /* Efecto parpadeo en los segundos */
    .parpadeo {
      opacity: 1;
      transition: opacity 0.5s;
    }
    .parpadeo.off {
      opacity: 0.2;
    }
  </style>
</head>
<body>
  <h1>Hora Actual</h1>
  <div id="hora">--:--:--</div>

  <script>
    function actualizarHora() {
      const ahora = new Date();

      const m = String(ahora.getMinutes()).padStart(2, '0');
      const s = String(ahora.getSeconds()).padStart(2, '0');

      // Parpadeo de los segundos
      const parpadeo = (ahora.getSeconds() % 2 === 0) ? 'off' : '';
      document.getElementById('hora').innerHTML = `${h}:${m}:<span class="parpadeo ${parpadeo}">${s}</span>`;
    }

    setInterval(actualizarHora, 500);
    actualizarHora();
  </script>
</body>
</html>
